<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Volume Booster</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background-color: #202124;
      color: #e8eaed;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 18px;
      font-weight: 500;
    }
    input[type=range] {
      width: 100%;
      margin: 10px 0;
      accent-color: #8ab4f8;
    }
    .value-display {
      font-size: 24px;
      font-weight: bold;
      color: #8ab4f8;
      margin-bottom: 10px;
    }
    .status {
      font-size: 12px;
      color: #9aa0a6;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h3>Volume Booster</h3>
  <div class="value-display"><span id="volumeValue">100</span>%</div>
  <input type="range" id="volumeSlider" min="1" max="500" value="100">
  <button id="stopButton" style="margin-top: 15px; padding: 8px 16px; background-color: #ea4335; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;">Turn Off / Reset</button>
  <div class="status">Works on current tab audio/video</div>
  <script src="popup.js"></script>
</body>
</html>
